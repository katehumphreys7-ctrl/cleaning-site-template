<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Site</title>
<style>html,body{margin:0;padding:0}#app{display:block;width:100%;border:0}</style>
</head>
<body>
<iframe id="app" src="./index.html" title="Site" scrolling="no" style="height:3500px"></iframe>
<script>
(function(){
  var app = document.getElementById('app');
  var last = 0;
  function measure(){
    try {
      var d = app.contentDocument || app.contentWindow.document;
      var h = Math.max(d.body.scrollHeight, d.documentElement.scrollHeight);
      if (h && h !== last){
        last = h;
        app.style.height = h + 'px';
        parent.postMessage({ siteHeight: h }, '*');
      }
    } catch(e){}
  }
  app.addEventListener('load', measure);
  window.addEventListener('resize', measure);
  setInterval(measure, 600);
})();
</script>
</body>
</html>
